name: Sunflower
options:
  bundleIdPrefix: com.noseyDewdrop
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  GENERATE_INFOPLIST_FILE: true
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: 1
targets:
  Sunflower:
    type: application
    platform: iOS
    sources:
      - path: Sunflower
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.noseyDewdrop.sunflower
      INFOPLIST_FILE: Sunflower/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      SWIFT_EMIT_LOC_STRINGS: true
      DEVELOPMENT_TEAM: ""
    info:
      path: Sunflower/Info.plist
      properties:
        UIAppFonts:
          - PixelifySans-Regular.ttf
          - PixelifySans-Bold.ttf
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
